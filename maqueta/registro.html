<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../frontend/css/global.css">
    <title>Registro - Gestión de Inventario</title>
</head>
<body>
    <div class="page">
        <header class="header">
            <h1 class="header__title">Sistema de Gestión de Inventario</h1>
            <nav class="nav">
                <ul class="nav__list">
                    <li><a href="index.html" class="nav__link">Inicio</a></li>
                    <li><a href="dashboard-admin.html" class="nav__link">Productos</a></li>
                    <li><a href="stock.html" class="nav__link">Stock</a></li>
                    <li><a href="reportes.html" class="nav__link">Reportes</a></li>
                    <li><a href="quienes-somos.html" class="nav__link">Quiénes Somos</a></li>
                    <li class="nav__item--login"><a href="login.html" class="nav__link">Login</a></li>
                </ul>
            </nav>
        </header>

        <main class="main">
            <section class="card">
                <h2 class="card__title">Registro de Usuario</h2>

                <form action="dashboard-admin.html" method="get">
                    <div>
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre">
                    </div>

                    <br><br>

                    <div>
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" name="apellido">
                    </div>

                    <br><br>

                    <div>
                        <label for="correo">Correo electrónico</label>
                        <input type="email" id="correo" name="correo">
                    </div>

                    <br><br>

                    <div>
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password">
                    </div>

                    <br><br>

                    <div>
                        <label for="confirmar">Confirmar contraseña</label>
                        <input type="password" id="confirmar" name="confirmar">
                    </div>

                    <br><br>

                    <button type="submit" class="nav__link">Registrarse</button>
                </form>

                <p class="card__text" style="margin-top: 1rem;">
                    ¿Ya tienes una cuenta?
                    <a href="login.html" class="nav__link">Iniciar sesión</a>
                </p>
            </section>
        </main>

        <footer class="footer">
            <p class="footer__text">Proyecto Gestión de Inventario - Full Stack I - 2026</p>
            <p class="footer__text">Grupo LCR</p>
        </footer>
    </div>
</body>
</html>
