<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../frontend/css/global.css">
    <title>Inicio de Sesión - Gestión de Inventario</title>
</head>
<body>
    <div class="page">
        <header class="header">
            <h1 class="header__title">Sistema de Gestión de Inventario</h1>
            <nav class="nav">
                <ul class="nav__list">
                    <li><a href="index.html" class="nav__link">Inicio</a></li>
                    <li><a href="dashboard-admin.html" class="nav__link">Productos</a></li>
                    <li><a href="stock.html" class="nav__link">Stock</a></li>
                    <li><a href="reportes.html" class="nav__link">Reportes</a></li>
                    <li><a href="quienes-somos.html" class="nav__link">Quiénes Somos</a></li>
                    <li class="nav__item--login"><a href="login.html" class="nav__link">Login</a></li>
                </ul>
            </nav>
        </header>

        <main class="main">
            <section>
                <h2>Iniciar Sesión</h2>

                <form action="dashboard-admin.html" method="get">
                    <label for="usuario">Usuario o correo electrónico</label>
                    <input type="email" id="usuario" name="usuario" />

                    <br /><br />

                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" />

                    <br /><br />

                    <button type="submit">Ingresar</button>
                </form>

                <p style="margin-top: 1rem;">
                    ¿No tienes cuenta?
                    <a href="registro.html">Registrarse</a>
                </p>
            </section>
        </main>

        <footer class="footer">
            <p class="footer__text">Proyecto Gestión de Inventario - Full Stack I - 2026</p>
            <p class="footer__text">Grupo LCR</p>
        </footer>
    </div>
</body>
</html>
